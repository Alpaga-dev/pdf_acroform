name: pdf_acroform
description: >-
  A Dart/Flutter package to parse PDF AcroForm fields and display
  interactive form overlays. Extract metadata and render editable fields.
version: 0.4.0
homepage: https://github.com/alpaga-dev/pdf_acroform
repository: https://github.com/alpaga-dev/pdf_acroform
issue_tracker: https://github.com/alpaga-dev/pdf_acroform/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  dart_pdf_reader: ^2.1.0
  flutter:
    sdk: flutter
  meta: ^1.9.0
  pdfrx: ^1.3.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true

topics:
  - pdf
  - forms
  - acroform
  - pdf-parser

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
